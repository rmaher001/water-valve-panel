# Water Valve Panel — main config
# Included by homelab-esphome/water-valve-panel.yaml via packages:.
# Hardware: M5Stack CoreS3 SE.
# Canonical config base: https://devices.esphome.io/devices/m5stack-cores3/

esphome:
  min_version: 2024.6.0
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 500ms
      - script.execute: render_state

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

psram:
  mode: quad
  speed: 80MHz

logger:
  level: INFO

# ----- Drivers for AXP2101 PMU, AW9523B GPIO expander, AW88298 audio amp -----
external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [axp2101, aw88298, aw9523b]

# ----- I2C internal bus (PMU, expander, touch all share this) -----
i2c:
  - id: bus_internal
    sda: GPIO12
    scl: GPIO11

# ----- SPI for the display -----
spi:
  - id: spi_bus
    clk_pin: GPIO36
    mosi_pin: GPIO37

# ----- AXP2101 power management chip -----
axp2101:
  id: axp2101_pmu
  i2c_id: bus_internal

# ----- AW9523B GPIO expander. p0_drive_mode: PUSH_PULL required by M5's reference.
aw9523b:
  - id: aw9523b_hub
    i2c_id: bus_internal
    p0_drive_mode: PUSH_PULL

# ----- AXP2101 power rails (touch chip + audio depend on ALDO/BLDO) -----
output:
  - platform: axp2101
    type: range
    channel: DLDO1
    id: lcd_backlight_output
    min_voltage: 2600
    max_voltage: 3300

  - platform: axp2101
    channel: ALDO1
    voltage: 1800

  - platform: axp2101
    channel: ALDO2
    voltage: 3300

  - platform: axp2101
    channel: BLDO1
    voltage: 2800

  - platform: axp2101
    channel: BLDO2
    voltage: 1500

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "${friendly_name} Backlight"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    internal: true

# ----- Display: 320x240 IPS via MIPI/SPI -----
display:
  - platform: mipi_spi
    model: M5CORE
    id: panel_display
    spi_id: spi_bus
    cs_pin: GPIO3
    dc_pin: GPIO35
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 9
    data_rate: 40MHz
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false

# ----- Touchscreen FT6336U -----
touchscreen:
  - platform: ft63x6
    id: panel_touch
    i2c_id: bus_internal
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 0
    calibration:
      x_min: 0
      x_max: 320
      y_min: 0
      y_max: 240

# ----- Fonts (MDI for valve glyphs, Roboto for UI text) -----
font:
  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: mdi_40
    size: 40
    bpp: 4
    glyphs: ["\U000F1068", "\U000F1067"]

  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: mdi_34
    size: 34
    bpp: 4
    glyphs: ["\U000F1068", "\U000F1067"]

  - file: "gfonts://Roboto@600"
    id: text_14
    size: 14
    bpp: 4
    glyphs: " abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789·:.,—●'"

  - file: "gfonts://Roboto@700"
    id: text_18
    size: 18
    bpp: 4
    glyphs: " abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ·"

  - file: "gfonts://Roboto@800"
    id: text_28
    size: 28
    bpp: 4
    glyphs: " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789…—"

# ----- Globals -----
globals:
  - id: actuating
    type: bool
    restore_value: no
    initial_value: 'false'   # true between button tap and Z-Wave state confirmation

  - id: pulse_phase
    type: bool
    restore_value: no
    initial_value: 'false'   # toggled by the disconnect-pulse interval

# ----- HA bindings: time, valve state, flow rate, daily total -----
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: update_time_label

text_sensor:
  - platform: homeassistant
    id: valve_state
    entity_id: switch.main_water_valve_robot
    on_value:
      then:
        - lambda: 'id(actuating) = false;'
        - script.execute: render_state

sensor:
  - platform: homeassistant
    id: droplet_flow
    entity_id: sensor.droplet_flow_rate
    on_value:
      then:
        - script.execute: render_state

  - platform: homeassistant
    id: droplet_today
    entity_id: sensor.droplet_daily_water
    on_value:
      then:
        - script.execute: render_state

# Re-render every 5s to track API connection drops + refresh time
interval:
  - interval: 5s
    then:
      - script.execute: render_state
  - interval: 30s
    then:
      - script.execute: update_time_label
  # Pulse the connection indicator (dot + label) when disconnected: full opacity
  # 0.8s, low opacity 0.8s. Stays solid when connected.
  - interval: 800ms
    then:
      - lambda: |-
          if (id(ha_api).is_connected()) {
            lv_obj_set_style_opa(id(conn_dot), 255, 0);
            lv_obj_set_style_opa(id(conn_label), 255, 0);
            id(pulse_phase) = false;
            return;
          }
          id(pulse_phase) = !id(pulse_phase);
          uint8_t opa = id(pulse_phase) ? 46 : 255;  // ~18% / 100%
          lv_obj_set_style_opa(id(conn_dot), opa, 0);
          lv_obj_set_style_opa(id(conn_label), opa, 0);

  # Flow-bar color pulse: when flow > 0, swap the fill between two blue shades
  # at a rate-derived period (slow at low flow, fast at high). Gives a visible
  # "water moving" cue. Invisible when no flow (bar empty → no swap).
  - interval: 100ms
    then:
      - lambda: |-
          static uint32_t last_flip = 0;
          static bool flow_phase = false;
          float rate = id(droplet_flow).has_state() ? id(droplet_flow).state : 0.0f;
          if (isnan(rate) || rate <= 0.05f) {
            lv_obj_set_style_bg_color(id(flow_bar_fill), lv_color_hex(0x1f6feb), 0);
            return;
          }
          uint32_t now = millis();
          float scale = rate / 15.0f;
          if (scale > 1.0f) scale = 1.0f;
          // Period 3200ms → 900ms across rate 0..15 gpm
          uint32_t period_ms = (uint32_t)(3200 - 2300 * scale);
          if (now - last_flip < period_ms / 2) return;
          last_flip = now;
          flow_phase = !flow_phase;
          lv_obj_set_style_bg_color(id(flow_bar_fill),
                                    lv_color_hex(flow_phase ? 0x1f6feb : 0x4c8df5), 0);

# ----- LVGL UI: three-state water valve panel -----
lvgl:
  displays: panel_display
  touchscreens: panel_touch
  bg_color: 0xf5f5f7
  default_font: text_18
  text_color: 0x1c1c1e
  pages:
    - id: page_main
      bg_color: 0xf5f5f7
      widgets:
        # ----- Top bar -----
        - label:
            id: conn_dot
            x: 12
            y: 6
            text: "●"
            text_color: 0x1d8348
            text_font: text_14
        - label:
            id: conn_label
            x: 28
            y: 6
            text: "connected"
            text_color: 0x1c1c1e
            text_font: text_14
        - label:
            id: time_label
            align: TOP_RIGHT
            x: -12
            y: 6
            text: "—"
            text_color: 0x1c1c1e
            text_font: text_14

        # ----- Action button (tappable via on_short_clicked) -----
        - obj:
            id: action_btn
            x: 14
            y: 36
            width: 292
            height: 90
            clickable: true
            bg_color: 0xc0392b
            bg_grad_color: 0x962419
            bg_grad_dir: VER
            radius: 12
            shadow_width: 14
            shadow_color: 0x000000
            shadow_opa: 38%
            widgets:
              - label:
                  id: action_icon
                  align: LEFT_MID
                  x: 22
                  text: "\U000F1067"
                  text_color: 0xffffff
                  text_font: mdi_40
              - label:
                  id: action_text
                  align: CENTER
                  x: 24
                  text: "CLOSE"
                  text_color: 0xffffff
                  text_font: text_28
            on_short_click:
              then:
                - lambda: |-
                    if (id(actuating)) return;
                    if (!id(ha_api).is_connected()) return;
                    std::string vs = id(valve_state).state;
                    if (vs.empty() || vs == "unavailable" || vs == "unknown") return;
                    id(actuating) = true;
                    // Visual disable while waiting for Z-Wave to actuate (~5-10 s)
                    lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0xc1c1c5), 0);
                    lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0xc1c1c5), 0);
                    lv_obj_set_style_shadow_opa(id(action_btn), 0, 0);
                - if:
                    condition:
                      lambda: 'return id(valve_state).state == "on";'
                    then:
                      - homeassistant.service:
                          service: switch.turn_off
                          data:
                            entity_id: switch.main_water_valve_robot
                    else:
                      - homeassistant.service:
                          service: switch.turn_on
                          data:
                            entity_id: switch.main_water_valve_robot

        # ----- Status row -----
        - label:
            id: status_icon
            align: TOP_MID
            x: -94
            y: 144
            text: "\U000F1068"
            text_color: 0x1d8348
            text_font: mdi_34
        - label:
            id: status_text
            align: TOP_MID
            x: 30
            y: 152
            text: "Water Valve · OPEN"
            text_color: 0x1d8348
            text_font: text_18

        - label:
            id: last_known_label
            align: TOP_MID
            x: 0
            y: 178
            text: "last known state — can't reach HA"
            text_color: 0x7a7a82
            text_font: text_14
            hidden: true

        # ----- Flow row -----
        - obj:
            id: flow_bar_bg
            x: 14
            y: 192
            width: 292
            height: 10
            bg_color: 0xe2e2e6
            border_color: 0xc1c1c5
            border_width: 1
            radius: 3
            widgets:
              - obj:
                  id: flow_bar_fill
                  x: 0
                  y: 0
                  width: 0
                  height: 10
                  bg_color: 0x1f6feb
                  border_width: 0
                  radius: 2
        - label:
            id: flow_rate_label
            x: 14
            y: 212
            text: "flow: 0.0 gpm"
            text_color: 0x7a7a82
            text_font: text_14
        - label:
            id: flow_today_label
            align: TOP_RIGHT
            x: -14
            y: 212
            text: "today: 0 gal"
            text_color: 0x7a7a82
            text_font: text_14

# ----- Render scripts -----
script:
  # Repaint the whole UI based on current HA connection + entity state.
  - id: render_state
    then:
      - lambda: |-
          const char* OPEN_GLYPH   = "\xF3\xB1\x81\xA8";  // U+F1068 valve-open
          const char* CLOSED_GLYPH = "\xF3\xB1\x81\xA7";  // U+F1067 valve-closed

          bool connected = id(ha_api).is_connected();
          std::string vs = connected ? id(valve_state).state : std::string("");
          bool unknown = vs.empty() || vs == "unavailable" || vs == "unknown";

          // ====================== DISCONNECTED ======================
          if (!connected || unknown) {
            lv_label_set_text(id(conn_label), "disconnected");
            lv_obj_set_style_text_color(id(conn_dot), lv_color_hex(0xb62324), 0);
            lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0xc1c1c5), 0);
            lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0xc1c1c5), 0);
            lv_obj_set_style_shadow_opa(id(action_btn), 0, 0);
            // Show last-known state (whatever the action_icon / status_text were last set to)
            lv_obj_set_style_text_color(id(status_icon), lv_color_hex(0x9a9a9f), 0);
            lv_obj_set_style_text_color(id(status_text), lv_color_hex(0x9a9a9f), 0);
            lv_obj_clear_flag(id(last_known_label), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(flow_rate_label), "flow: —");
            lv_label_set_text(id(flow_today_label), "today: —");
            lv_obj_set_width(id(flow_bar_fill), 0);
            return;
          }

          // ====================== CONNECTED ======================
          lv_label_set_text(id(conn_label), "connected");
          lv_obj_set_style_text_color(id(conn_dot), lv_color_hex(0x1d8348), 0);
          lv_obj_add_flag(id(last_known_label), LV_OBJ_FLAG_HIDDEN);

          bool actuating_now = id(actuating);
          bool valve_open = (vs == "on");

          if (valve_open) {
            // OPEN state: red CLOSE button, green status
            lv_label_set_text(id(action_icon), CLOSED_GLYPH);
            lv_label_set_text(id(action_text), "CLOSE");
            if (!actuating_now) {
              lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0xc0392b), 0);
              lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0x962419), 0);
              lv_obj_set_style_shadow_opa(id(action_btn), 97, 0);
            }
            lv_label_set_text(id(status_icon), OPEN_GLYPH);
            lv_obj_set_style_text_color(id(status_icon), lv_color_hex(0x1d8348), 0);
            lv_label_set_text(id(status_text), "Water Valve · OPEN");
            lv_obj_set_style_text_color(id(status_text), lv_color_hex(0x1d8348), 0);
          } else {
            // CLOSED state: green OPEN button, red status
            lv_label_set_text(id(action_icon), OPEN_GLYPH);
            lv_label_set_text(id(action_text), "OPEN");
            if (!actuating_now) {
              lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0x2ea14a), 0);
              lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0x1c6a31), 0);
              lv_obj_set_style_shadow_opa(id(action_btn), 97, 0);
            }
            lv_label_set_text(id(status_icon), CLOSED_GLYPH);
            lv_obj_set_style_text_color(id(status_icon), lv_color_hex(0xb62324), 0);
            lv_label_set_text(id(status_text), "Water Valve · CLOSED");
            lv_obj_set_style_text_color(id(status_text), lv_color_hex(0xb62324), 0);
          }

          // Flow row
          float rate = id(droplet_flow).has_state() ? id(droplet_flow).state : 0.0f;
          if (isnan(rate)) rate = 0.0f;
          float today = id(droplet_today).has_state() ? id(droplet_today).state : 0.0f;
          if (isnan(today)) today = 0.0f;

          char rate_buf[24], today_buf[24];
          snprintf(rate_buf, sizeof(rate_buf), "flow: %.1f gpm", rate);
          snprintf(today_buf, sizeof(today_buf), "today: %.0f gal", today);
          lv_label_set_text(id(flow_rate_label), rate_buf);
          lv_label_set_text(id(flow_today_label), today_buf);

          // Flow bar fill = (rate / 15 gpm) × 292 px width, capped at 292
          float scale = rate / 15.0f;
          if (scale > 1.0f) scale = 1.0f;
          int w = (rate <= 0.05f) ? 0 : (int)(scale * 292);
          lv_obj_set_width(id(flow_bar_fill), w);

  # Format the top-right time label from HA-synced time
  - id: update_time_label
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) {
            lv_label_set_text(id(time_label), "—");
            return;
          }
          int h = t.hour % 12;
          if (h == 0) h = 12;
          char buf[12];
          snprintf(buf, sizeof(buf), "%d:%02d%c", h, t.minute, t.hour < 12 ? 'a' : 'p');
          lv_label_set_text(id(time_label), buf);
