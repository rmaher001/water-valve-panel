# Water Valve Panel — main config
# Included by homelab-esphome/water-valve-panel.yaml via packages:.
# Hardware: M5Stack CoreS3 SE.
# Canonical config base: https://devices.esphome.io/devices/m5stack-cores3/

esphome:
  min_version: 2024.6.0
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 500ms
      - script.execute: render_state

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

psram:
  mode: quad
  speed: 80MHz

logger:
  level: INFO

# ----- Drivers for AXP2101 PMU, AW9523B GPIO expander, AW88298 audio amp -----
external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [axp2101, aw88298, aw9523b]

# ----- I2C internal bus (PMU, expander, touch all share this) -----
i2c:
  - id: bus_internal
    sda: GPIO12
    scl: GPIO11

# ----- SPI for the display -----
spi:
  - id: spi_bus
    clk_pin: GPIO36
    mosi_pin: GPIO37

# ----- AXP2101 power management chip -----
axp2101:
  id: axp2101_pmu
  i2c_id: bus_internal

# ----- AW9523B GPIO expander (LCD reset on pin 9, touch reset on pin 0) -----
aw9523b:
  - id: aw9523b_hub
    i2c_id: bus_internal

# ----- Backlight via AXP2101 DLDO1 rail -----
output:
  - platform: axp2101
    type: range
    channel: DLDO1
    id: lcd_backlight_output
    min_voltage: 2600
    max_voltage: 3300

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "${friendly_name} Backlight"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    internal: true

# ----- Display: 320x240 IPS via MIPI/SPI -----
display:
  - platform: mipi_spi
    model: M5CORE
    id: panel_display
    spi_id: spi_bus
    cs_pin: GPIO3
    dc_pin: GPIO35
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 9
    data_rate: 40MHz
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false

# ----- Touchscreen FT6336U -----
touchscreen:
  - platform: ft63x6
    id: panel_touch
    i2c_id: bus_internal
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 0
    calibration:
      x_min: 0
      x_max: 320
      y_min: 0
      y_max: 240

# ----- Fonts -----
# MDI valve glyphs (U+F1068 valve-open, U+F1067 valve-closed) at two sizes:
#   mdi_40 → action button icon
#   mdi_34 → status row icon
# Roboto via gfonts:// for the UI text at three sizes.
font:
  - file: "src/fonts/materialdesignicons-webfont.ttf"
    id: mdi_40
    size: 40
    bpp: 4
    glyphs: ["\U000F1068", "\U000F1067"]

  - file: "src/fonts/materialdesignicons-webfont.ttf"
    id: mdi_34
    size: 34
    bpp: 4
    glyphs: ["\U000F1068", "\U000F1067"]

  - file: "gfonts://Roboto@600"
    id: text_14
    size: 14
    bpp: 4
    glyphs: " abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789·:.,—●"

  - file: "gfonts://Roboto@700"
    id: text_18
    size: 18
    bpp: 4
    glyphs: " abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ·"

  - file: "gfonts://Roboto@800"
    id: text_28
    size: 28
    bpp: 4
    glyphs: " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789…—"

# ----- Globals for debug state cycler -----
globals:
  - id: debug_state
    type: int
    restore_value: no
    initial_value: '0'   # 0=OPEN, 1=CLOSED, 2=DISCONNECTED

# ----- LVGL UI: three-state water valve panel -----
lvgl:
  displays: panel_display
  touchscreens: panel_touch
  bg_color: 0xf5f5f7
  default_font: text_18
  text_color: 0x1c1c1e
  pages:
    - id: page_main
      bg_color: 0xf5f5f7
      widgets:
        # ----- Top bar: connection indicator (left) + time (right) -----
        - label:
            id: conn_dot
            x: 12
            y: 6
            text: "●"
            text_color: 0x1d8348
            text_font: text_14
        - label:
            id: conn_label
            x: 28
            y: 6
            text: "connected"
            text_color: 0x1c1c1e
            text_font: text_14
        - label:
            id: time_label
            align: TOP_RIGHT
            x: -12
            y: 6
            text: "—"
            text_color: 0x1c1c1e
            text_font: text_14

        # ----- Action button: 292x90 at (14, 36). Using `obj` (not `button`) so we
        # can nest icon + label children. `clickable: true` makes it tappable.
        - obj:
            id: action_btn
            x: 14
            y: 36
            width: 292
            height: 90
            clickable: true
            bg_color: 0xc0392b
            bg_grad_color: 0x962419
            bg_grad_dir: VER
            radius: 12
            shadow_width: 14
            shadow_color: 0x000000
            shadow_opa: 38
            widgets:
              - label:
                  id: action_icon
                  align: LEFT_MID
                  x: 22
                  text: "\U000F1067"  # valve-closed (preview of CLOSE)
                  text_color: 0xffffff
                  text_font: mdi_40
              - label:
                  id: action_text
                  align: CENTER
                  x: 24
                  text: "CLOSE"
                  text_color: 0xffffff
                  text_font: text_28

        # ----- Status row (icon + 'Water Valve · OPEN/CLOSED'), single line, centered -----
        - label:
            id: status_icon
            align: TOP_MID
            x: -94
            y: 144
            text: "\U000F1068"
            text_color: 0x1d8348
            text_font: mdi_34
        - label:
            id: status_text
            align: TOP_MID
            x: 30
            y: 152
            text: "Water Valve · OPEN"
            text_color: 0x1d8348
            text_font: text_18

        # ----- Last-known caption (disconnected only) -----
        - label:
            id: last_known_label
            align: TOP_MID
            x: 0
            y: 178
            text: "last known state"
            text_color: 0x7a7a82
            text_font: text_14
            hidden: true

        # ----- Flow row: bar + meta -----
        - obj:
            id: flow_bar_bg
            x: 14
            y: 192
            width: 292
            height: 10
            bg_color: 0xe2e2e6
            border_color: 0xc1c1c5
            border_width: 1
            radius: 3
            widgets:
              - obj:
                  id: flow_bar_fill
                  x: 0
                  y: 0
                  width: 0
                  height: 10
                  bg_color: 0x1f6feb
                  border_width: 0
                  radius: 2
        - label:
            id: flow_rate_label
            x: 14
            y: 212
            text: "flow: 0.0 gpm"
            text_color: 0x7a7a82
            text_font: text_14
        - label:
            id: flow_today_label
            align: TOP_RIGHT
            x: -14
            y: 212
            text: "today: 87 gal"
            text_color: 0x7a7a82
            text_font: text_14

# ----- Debug touch zone: tap the top bar (y < 28) to cycle states -----
binary_sensor:
  - platform: touchscreen
    name: "Debug top-bar tap"
    internal: true
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 28
    on_press:
      then:
        - lambda: |-
            id(debug_state) = (id(debug_state) + 1) % 3;
        - script.execute: render_state

# ----- Render script: paints the widgets for the current debug_state -----
script:
  - id: render_state
    then:
      - lambda: |-
          int s = id(debug_state);
          const char* OPEN_GLYPH   = "\xF3\xB1\x81\xA8";  // U+F1068 valve-open
          const char* CLOSED_GLYPH = "\xF3\xB1\x81\xA7";  // U+F1067 valve-closed

          if (s == 0) {
            // OPEN: red CLOSE button, green status
            lv_label_set_text(id(action_icon), CLOSED_GLYPH);
            lv_label_set_text(id(action_text), "CLOSE");
            lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0xc0392b), 0);
            lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0x962419), 0);
            lv_obj_set_style_shadow_opa(id(action_btn), 38, 0);

            lv_label_set_text(id(status_icon), OPEN_GLYPH);
            lv_obj_set_style_text_color(id(status_icon), lv_color_hex(0x1d8348), 0);
            lv_label_set_text(id(status_text), "Water Valve · OPEN");
            lv_obj_set_style_text_color(id(status_text), lv_color_hex(0x1d8348), 0);

            lv_obj_add_flag(id(last_known_label), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(conn_label), "connected");
            lv_obj_set_style_text_color(id(conn_dot), lv_color_hex(0x1d8348), 0);
            lv_label_set_text(id(flow_rate_label), "flow: 0.0 gpm");
            lv_label_set_text(id(flow_today_label), "today: 87 gal");
          }
          else if (s == 1) {
            // CLOSED: green OPEN button, red status
            lv_label_set_text(id(action_icon), OPEN_GLYPH);
            lv_label_set_text(id(action_text), "OPEN");
            lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0x2ea14a), 0);
            lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0x1c6a31), 0);
            lv_obj_set_style_shadow_opa(id(action_btn), 38, 0);

            lv_label_set_text(id(status_icon), CLOSED_GLYPH);
            lv_obj_set_style_text_color(id(status_icon), lv_color_hex(0xb62324), 0);
            lv_label_set_text(id(status_text), "Water Valve · CLOSED");
            lv_obj_set_style_text_color(id(status_text), lv_color_hex(0xb62324), 0);

            lv_obj_add_flag(id(last_known_label), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(conn_label), "connected");
            lv_obj_set_style_text_color(id(conn_dot), lv_color_hex(0x1d8348), 0);
            lv_label_set_text(id(flow_rate_label), "flow: 0.0 gpm");
            lv_label_set_text(id(flow_today_label), "today: 87 gal");
          }
          else {
            // DISCONNECTED: greyed button, muted status, last-known caption
            lv_label_set_text(id(action_icon), CLOSED_GLYPH);
            lv_label_set_text(id(action_text), "CLOSE");
            lv_obj_set_style_bg_color(id(action_btn), lv_color_hex(0xc1c1c5), 0);
            lv_obj_set_style_bg_grad_color(id(action_btn), lv_color_hex(0xc1c1c5), 0);
            lv_obj_set_style_shadow_opa(id(action_btn), 0, 0);

            lv_label_set_text(id(status_icon), OPEN_GLYPH);
            lv_obj_set_style_text_color(id(status_icon), lv_color_hex(0x9a9a9f), 0);
            lv_label_set_text(id(status_text), "Water Valve · OPEN");
            lv_obj_set_style_text_color(id(status_text), lv_color_hex(0x9a9a9f), 0);

            lv_obj_clear_flag(id(last_known_label), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(conn_label), "disconnected");
            lv_obj_set_style_text_color(id(conn_dot), lv_color_hex(0xb62324), 0);
            lv_label_set_text(id(flow_rate_label), "flow: —");
            lv_label_set_text(id(flow_today_label), "today: —");
          }

